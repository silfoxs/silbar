name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve build environment overrides
        env:
          APP_VERSION_OVERRIDE: ${{ vars.APP_VERSION }}
          APP_BUILD_NUMBER_OVERRIDE: ${{ vars.APP_BUILD_NUMBER }}
        run: |
          if [[ -n "${APP_VERSION_OVERRIDE:-}" ]]; then
            echo "APP_VERSION=$APP_VERSION_OVERRIDE" >> "$GITHUB_ENV"
          fi

          if [[ -n "${APP_BUILD_NUMBER_OVERRIDE:-}" ]]; then
            echo "APP_BUILD_NUMBER=$APP_BUILD_NUMBER_OVERRIDE" >> "$GITHUB_ENV"
          fi

      - name: Build installer
        id: build-installer
        run: |
          PACKAGE_PATH="$(./script/build_and_run.sh package | tail -n 1)"
          PACKAGE_NAME="$(basename "$PACKAGE_PATH")"
          APP_NAME="SilBar"
          APP_VERSION="${PACKAGE_NAME#"$APP_NAME"-}"
          APP_VERSION="${APP_VERSION%-arm64.dmg}"
          APP_VERSION="${APP_VERSION%-x86_64.dmg}"
          APP_VERSION="${APP_VERSION%-universal.dmg}"

          echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: Silbar-v${{ steps.build-installer.outputs.app_version }}
          RELEASE_TITLE: Silbar-v${{ steps.build-installer.outputs.app_version }}
          PACKAGE_PATH: ${{ steps.build-installer.outputs.package_path }}
          PACKAGE_NAME: ${{ steps.build-installer.outputs.package_name }}
        run: |
          set -euo pipefail

          RELEASE_EXISTS=0
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            RELEASE_EXISTS=1
            IS_DRAFT="$(gh release view "$TAG_NAME" --json isDraft --jq '.isDraft')"
            if [[ "$IS_DRAFT" != "true" ]]; then
              echo "Release $TAG_NAME is already published. Bump APP_VERSION before creating a new draft." >&2
              exit 1
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          SHORT_SHA="${GITHUB_SHA::7}"
          NOTES="Draft build from main commit ${SHORT_SHA}: ${PACKAGE_NAME}."

          if [[ "$RELEASE_EXISTS" -eq 1 ]]; then
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes "$NOTES"
            while IFS= read -r asset_name; do
              case "$asset_name" in
                SilBar*.dmg)
                  gh release delete-asset "$TAG_NAME" "$asset_name" --yes
                  ;;
              esac
            done < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')
            gh release upload "$TAG_NAME" "$PACKAGE_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$PACKAGE_PATH" \
              --title "$RELEASE_TITLE" \
              --notes "$NOTES" \
              --draft
          fi
