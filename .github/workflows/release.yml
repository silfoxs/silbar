name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build installer
        id: build-installer
        run: |
          PACKAGE_PATH="$(./script/build_and_run.sh package | tail -n 1)"
          PACKAGE_NAME="$(basename "$PACKAGE_PATH")"
          APP_NAME="SilBar"
          APP_VERSION="${PACKAGE_NAME#"$APP_NAME"-}"
          APP_VERSION="${APP_VERSION%-arm64.dmg}"
          APP_VERSION="${APP_VERSION%-x86_64.dmg}"
          APP_VERSION="${APP_VERSION%-universal.dmg}"

          echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-installer.outputs.package_name }}
          path: ${{ steps.build-installer.outputs.package_path }}
          if-no-files-found: error

      - name: Publish rolling GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: main-latest
          RELEASE_TITLE: ${{ steps.build-installer.outputs.app_name }} ${{ steps.build-installer.outputs.app_version }}
          PACKAGE_PATH: ${{ steps.build-installer.outputs.package_path }}
          PACKAGE_NAME: ${{ steps.build-installer.outputs.package_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG_NAME" --force

          SHORT_SHA="${GITHUB_SHA::7}"
          NOTES="Automated build from main commit ${SHORT_SHA}: ${PACKAGE_NAME}."

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes "$NOTES"
            while IFS= read -r asset_name; do
              case "$asset_name" in
                SilBar*.dmg)
                  gh release delete-asset "$TAG_NAME" "$asset_name" --yes
                  ;;
              esac
            done < <(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')
            gh release upload "$TAG_NAME" "$PACKAGE_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$PACKAGE_PATH" \
              --title "$RELEASE_TITLE" \
              --notes "$NOTES" \
              --latest
          fi
